# 1. Setup Folder & Pindahkan File
# Jalankan ini di lokal kamu (PC Windows kamu) untuk mem-build app dan kumpulkan file:
# Buka terminal dan masuk ke folder `D:\Dokumen\02_Kerja_Profesional\Telur\vps-deploy`

# 2. Buat file `docker-compose.yml` di vps-deploy
version: '3.8'

services:
  web-app:
    build:
      context: ../web-app
      dockerfile: ../vps-deploy/Dockerfile
      args:
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
    container_name: herofarm-web
    restart: always
    ports:
      - "8080:80"
    environment:
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}

  waha:
    image: devlikeapro/waha:latest
    container_name: waha
    restart: always
    ports:
      - "3000:3000"
    environment:
      - WAHA_WORKER_CONCURRENCY=2
      - WHATSAPP_CORS_ORIGIN=*
      - WHATSAPP_CORS_METHODS=GET,POST,PUT,DELETE,OPTIONS
      - WHATSAPP_CORS_HEADERS=Content-Type,Accept,X-Api-Key,Authorization
      - WHATSAPP_CORS_CREDENTIALS=true
      - WH_CORS_ALLOWED_ORIGINS=*
      - WAHA_API_KEY=${WAHA_API_KEY}
      - WAHA_DASHBOARD_USERNAME=${WAHA_DASHBOARD_USERNAME}
      - WAHA_DASHBOARD_PASSWORD=${WAHA_DASHBOARD_PASSWORD}
      - WHATSAPP_SWAGGER_USERNAME=${WHATSAPP_SWAGGER_USERNAME}
      - WHATSAPP_SWAGGER_PASSWORD=${WHATSAPP_SWAGGER_PASSWORD}
    volumes:
      - waha-data:/app/.waha

volumes:
  waha-data:
